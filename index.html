<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub User Info</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
        }

        .glass-card {
            background: rgba(22, 27, 34, 0.7);
            border: 1px solid #30363d;
            backdrop-filter: blur(12px);
        }

        .skeleton {
            background: linear-gradient(90deg, #161b22 25%, #21262d 50%, #161b22 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite linear;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .tab-btn.active {
            color: #58a6ff;
            border-bottom: 2px solid #58a6ff;
        }

        .achievement-badge {
            background: linear-gradient(135deg, #238636 0%, #2ea043 100%);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <!-- Navbar -->
    <nav class="sticky top-0 z-40 glass-card border-x-0 border-t-0 py-4 px-6 mb-8">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <i class="fi fi-rr-info text-blue-500 text-2xl"></i>
                <h1 class="text-xl font-bold text-white tracking-tight">GitHub User Info</h1>
            </div>
            <div class="flex items-center gap-3 w-full md:w-auto">
                <div class="relative w-full md:w-80">
                    <i class="fi fi-rr-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input 
                        type="text" 
                        id="usernameInput" 
                        placeholder="Search username..." 
                        class="w-full pl-11 pr-4 py-2 rounded-full bg-[#0d1117] border border-[#30363d] focus:outline-none focus:border-blue-500 text-sm transition-all"
                        onkeypress="if(event.key === 'Enter') updateUrlAndFetch()"
                    >
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4">
        
        <!-- Error Alert -->
        <div id="errorAlert" class="hidden mb-6 p-4 bg-red-900/20 border border-red-500/50 rounded-xl flex items-center gap-3 text-red-400">
            <i class="fi fi-rr-exclamation"></i>
            <span>User not found. Please check the spelling and try again.</span>
        </div>

        <!-- Skeleton Loader -->
        <div id="loadingUI" class="hidden space-y-8">
            <div class="glass-card rounded-3xl p-8 flex flex-col md:flex-row gap-8">
                <div class="w-32 h-32 rounded-3xl skeleton"></div>
                <div class="flex-1 space-y-4 pt-2">
                    <div class="h-8 w-48 skeleton rounded-lg"></div>
                    <div class="h-4 w-full skeleton rounded-lg"></div>
                    <div class="h-12 w-1/2 skeleton rounded-xl"></div>
                </div>
            </div>
        </div>

        <!-- Dashboard Content -->
        <main id="profileContent" class="hidden space-y-8">
            <section class="glass-card rounded-3xl p-6 md:p-10 relative overflow-hidden">
                <div class="flex flex-col md:flex-row gap-8 items-center md:items-start relative z-10">
                    <img id="avatar" src="" class="w-36 h-36 rounded-3xl border-4 border-[#30363d] shadow-2xl">
                    <div class="flex-1 text-center md:text-left">
                        <div class="flex flex-col md:flex-row md:items-center gap-4 mb-2">
                            <h2 id="fullName" class="text-3xl font-bold text-white"></h2>
                            <div id="achievementsList" class="flex flex-wrap justify-center md:justify-start gap-2"></div>
                        </div>
                        <p id="usernameDisplay" class="text-blue-400 font-medium mb-4 flex items-center justify-center md:justify-start gap-2">
                            <i class="fi fi-rr-at"></i><span id="loginId"></span>
                        </p>
                        <p id="bioText" class="text-gray-400 mb-6 max-w-2xl leading-relaxed"></p>
                        <div class="flex flex-wrap gap-3 mb-8 justify-center md:justify-start">
                            <div class="px-4 py-2 bg-[#161b22] border border-[#30363d] rounded-2xl text-center min-w-[100px]">
                                <span class="block text-[10px] text-gray-500 uppercase font-bold tracking-widest">Followers</span>
                                <span id="statFollowers" class="text-lg font-bold text-white">0</span>
                            </div>
                            <div class="px-4 py-2 bg-[#161b22] border border-[#30363d] rounded-2xl text-center min-w-[100px]">
                                <span class="block text-[10px] text-gray-500 uppercase font-bold tracking-widest">Following</span>
                                <span id="statFollowing" class="text-lg font-bold text-white">0</span>
                            </div>
                            <div class="px-4 py-2 bg-[#161b22] border border-[#30363d] rounded-2xl text-center min-w-[100px]">
                                <span class="block text-[10px] text-gray-500 uppercase font-bold tracking-widest">Total Stars</span>
                                <span id="statStars" class="text-lg font-bold text-white">0</span>
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-5 text-sm text-gray-400 justify-center md:justify-start border-t border-[#30363d] pt-6">
                            <span id="locBox" class="flex items-center gap-2"><i class="fi fi-rr-marker"></i> <span id="valLocation"></span></span>
                            <span id="linkBox" class="flex items-center gap-2"><i class="fi fi-rr-link"></i> <a id="valBlog" target="_blank" class="hover:text-blue-400"></a></span>
                            <span id="compBox" class="flex items-center gap-2"><i class="fi fi-rr-briefcase"></i> <span id="valCompany"></span></span>
                        </div>
                    </div>
                </div>
            </section>

            <div class="flex gap-8 border-b border-[#30363d] px-2 overflow-x-auto">
                <button onclick="switchTab('repos')" id="tab-repos" class="tab-btn active py-4 font-semibold flex items-center gap-2 whitespace-nowrap">
                    <i class="fi fi-rr-folder"></i> Repositories <span id="badgeRepos" class="bg-[#30363d] text-[10px] px-2 py-0.5 rounded-full">0</span>
                </button>
                <button onclick="switchTab('stars')" id="tab-stars" class="tab-btn py-4 font-semibold flex items-center gap-2 whitespace-nowrap">
                    <i class="fi fi-rr-star"></i> Starred
                </button>
            </div>

            <div id="reposView" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            <div id="starsView" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </main>
    </div>

    <script>
        const loadingUI = document.getElementById('loadingUI');
        const content = document.getElementById('profileContent');
        const errorAlert = document.getElementById('errorAlert');

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const username = params.get('usn') || params.get('username') || params.get('info');
            if (username) {
                document.getElementById('usernameInput').value = username;
                fetchProfile(username);
            }
        };

        function updateUrlAndFetch() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) return;
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?usn=' + username;
            window.history.pushState({ path: newUrl }, '', newUrl);
            fetchProfile(username);
        }

        async function fetchProfile(username) {
            errorAlert.classList.add('hidden');
            loadingUI.classList.remove('hidden');
            content.classList.add('hidden');

            try {
                const [uRes, rRes, sRes] = await Promise.all([
                    fetch(`https://api.github.com/users/${username}`),
                    fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=100`),
                    fetch(`https://api.github.com/users/${username}/starred?per_page=100`)
                ]);

                if (!uRes.ok) {
                    errorAlert.classList.remove('hidden');
                    loadingUI.classList.add('hidden');
                    return;
                }

                const user = await uRes.json();
                const repos = await rRes.json();
                const stars = await sRes.json();

                renderDashboard(user, repos, stars);
            } catch (err) {
                errorAlert.classList.remove('hidden');
            } finally {
                loadingUI.classList.add('hidden');
            }
        }

        function renderDashboard(user, repos, stars) {
            document.getElementById('avatar').src = user.avatar_url;
            document.getElementById('fullName').textContent = user.name || user.login;
            document.getElementById('loginId').textContent = user.login;
            document.getElementById('bioText').textContent = user.bio || "No description provided.";
            document.getElementById('statFollowers').textContent = user.followers.toLocaleString();
            document.getElementById('statFollowing').textContent = user.following.toLocaleString();
            document.getElementById('statStars').textContent = stars.length;
            document.getElementById('badgeRepos').textContent = user.public_repos;

            const achBox = document.getElementById('achievementsList');
            achBox.innerHTML = '';
            if (user.public_repos > 50) achBox.innerHTML += createBadge('Powerhouse', 'fi-rr-bolt');
            if (user.followers > 100) achBox.innerHTML += createBadge('Elite', 'fi-rr-star');
            
            updateMeta('valLocation', user.location, 'locBox');
            updateMeta('valBlog', user.blog, 'linkBox', true);
            updateMeta('valCompany', user.company, 'compBox');

            renderCards('reposView', repos);
            renderCards('starsView', stars);
            content.classList.remove('hidden');
        }

        function createBadge(text, icon) {
            return `<div class="achievement-badge flex items-center gap-1.5 px-3 py-1 rounded-full text-[9px] font-bold text-white uppercase"><i class="fi ${icon}"></i> ${text}</div>`;
        }

        function renderCards(containerId, items) {
            const container = document.getElementById(containerId);
            container.innerHTML = items.map(item => `
                <div class="glass-card p-5 rounded-2xl group flex flex-col justify-between">
                    <div>
                        <div class="flex items-start justify-between mb-2">
                            <a href="${item.html_url}" target="_blank" class="text-sm font-bold text-blue-400 hover:text-blue-300 transition-colors truncate pr-2">${item.name}</a>
                            <span class="text-[8px] border border-[#30363d] px-2 py-0.5 rounded-full uppercase text-gray-500 font-bold">${item.language || 'Code'}</span>
                        </div>
                        <p class="text-[11px] text-gray-400 line-clamp-2 mb-4 h-8">${item.description || 'No description.'}</p>
                    </div>
                    <div class="flex gap-4 text-[9px] text-gray-500 font-bold">
                        <span><i class="fi fi-rr-star"></i> ${item.stargazers_count}</span>
                        <span><i class="fi fi-rr-git-fork"></i> ${item.forks_count}</span>
                    </div>
                </div>
            `).join('');
        }

        function switchTab(tab) {
            document.getElementById('reposView').classList.toggle('hidden', tab !== 'repos');
            document.getElementById('starsView').classList.toggle('hidden', tab !== 'stars');
            document.getElementById('tab-repos').classList.toggle('active', tab === 'repos');
            document.getElementById('tab-stars').classList.toggle('active', tab === 'stars');
        }

        function updateMeta(id, value, boxId, isLink = false) {
            const el = document.getElementById(id);
            const box = document.getElementById(boxId);
            if (value) {
                if (isLink) { el.href = value.startsWith('http') ? value : `https://${value}`; el.textContent = value; }
                else { el.textContent = value; }
                box.classList.remove('hidden');
                box.classList.add('flex');
            } else { box.classList.add('hidden'); }
        }
    </script>
</body>
</html>
