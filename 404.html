<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Not Found · GitHub User Search</title>
  <meta name="description" content="This page doesn't exist.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://mrlipx.github.io/github-user-search/">
  <link rel="icon" type="image/png" href="assets/logo.png">
  <meta name="theme-color" content="#4d9ef7">
  <meta name="color-scheme" content="dark">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
  <link rel="stylesheet" href="assets/vars.css?v=IDewhVtoy4">
  <link rel="stylesheet" href="assets/base.css?v=IDewhVtoy4">
  <style>
    .nf-page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      animation: fadeUp .4s ease both;
    }
    .nf-code {
      font-family: 'Syne', sans-serif;
      font-size: clamp(7rem, 20vw, 11rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -.06em;
      color: transparent;
      -webkit-text-stroke: 1.5px rgba(77,158,247,.2);
      margin-bottom: 12px;
      user-select: none;
    }
    .nf-code .z { -webkit-text-stroke: 1.5px rgba(77,158,247,.65); filter: drop-shadow(0 0 18px rgba(77,158,247,.25)); }
    .nf-icon { font-size: 1.8rem; color: var(--accent); margin-bottom: 18px; display: block; }
    .nf-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      font-weight: 800;
      letter-spacing: -.04em;
      color: var(--text);
      margin-bottom: 10px;
    }
    .nf-sub {
      font-size: .88rem;
      color: var(--sub);
      max-width: 360px;
      line-height: 1.7;
      margin: 0 auto 28px;
    }
    .nf-sub code {
      font-family: 'DM Mono', monospace;
      font-size: .82em;
      color: var(--accent);
      background: rgba(77,158,247,.08);
      padding: 1px 5px;
      border-radius: 4px;
      border: 1px solid rgba(77,158,247,.15);
    }
    .nf-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      background: var(--accent);
      color: #fff;
      border-radius: var(--r-sm);
      font-size: .875rem;
      font-weight: 600;
      text-decoration: none;
      transition: background .18s, transform .12s;
      margin-bottom: 32px;
    }
    .nf-btn:hover { background: #3d8ee6; transform: translateY(-1px); }
    .nf-path {
      font-family: 'DM Mono', monospace;
      font-size: .68rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--r-sm);
      padding: 7px 14px;
      max-width: 360px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* background layers */
    .bg-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(77,158,247,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(77,158,247,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      -webkit-mask-image: radial-gradient(ellipse 90% 60% at 50% 0%, #000 20%, transparent 100%);
              mask-image: radial-gradient(ellipse 90% 60% at 50% 0%, #000 20%, transparent 100%);
    }
    .bg-orb { position: absolute; border-radius: 50%; }
    .bg-orb-1 { width: 640px; height: 640px; background: radial-gradient(circle, rgba(77,158,247,.07) 0%, transparent 70%); top: -200px; right: -120px; }
    .bg-orb-2 { width: 560px; height: 560px; background: radial-gradient(circle, rgba(188,140,255,.05) 0%, transparent 70%); bottom: -160px; left: -80px; }
  </style>
</head>
<body>
  <div class="bg-layer" aria-hidden="true">
    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
  </div>

  <main class="nf-page" role="main">
    <div class="nf-code" aria-hidden="true">4<span class="z">0</span>4</div>
    <i class="fi fi-rr-search nf-icon" aria-hidden="true"></i>
    <h1 class="nf-title">Page not found</h1>
    <p class="nf-sub">The path <code id="nf-path"></code> doesn't exist or has moved.</p>
    <a class="nf-btn" href=".">
      <i class="fi fi-rr-home" aria-hidden="true"></i>Back home
    </a>
    <div class="nf-path" id="nf-url"></div>
  </main>

  <script>
    (function() {
      var p = document.getElementById('nf-path');
      var u = document.getElementById('nf-url');
      if (p) p.textContent = location.pathname;
      if (u) u.textContent = location.href;
    }());
  </script>
</body>
</html>
