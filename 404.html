<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d1117; color: #c9d1d9; }
        .glow { filter: drop-shadow(0 0 10px rgba(88, 166, 255, 0.5)); }
        .float { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="text-center max-w-md">
        <div class="relative inline-block mb-10 float">
            <i class="fi fi-rr-compass text-8xl text-blue-500 glow"></i>
            <span class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] px-2 py-1 rounded-lg font-bold shadow-lg">404</span>
        </div>
        <h1 class="text-4xl font-bold text-white mb-4">Page Not Found</h1>
        <p class="text-gray-500 mb-8 leading-relaxed">
            The path you followed seems to have vanished or never existed. You might have typed the URL incorrectly or the page has moved.
        </p>
        <div class="flex flex-col items-center gap-4">
            <a href="/github-user-lookup" class="inline-flex items-center gap-3 px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-full font-bold transition-all transform hover:scale-105 shadow-xl shadow-blue-900/20">
                <i class="fi fi-rr-home"></i> Back to Safety
            </a>
            <p class="text-[10px] text-gray-600 uppercase tracking-widest mt-4">Standard 404 Error</p>
        </div>
    </div>
</body>
</html>
