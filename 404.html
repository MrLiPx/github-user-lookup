<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Profile Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0d1117; color: #c9d1d9; }
        .glow { filter: drop-shadow(0 0 10px rgba(88, 166, 255, 0.5)); }
        .ghost-float { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6 overflow-hidden">
    <div class="text-center max-w-md">
        <div class="relative inline-block mb-12 ghost-float">
            <i class="fi fi-rr-ghost text-9xl text-blue-500 glow"></i>
            <span class="absolute -top-2 -right-2 bg-red-500 text-white text-xs px-2 py-1 rounded-lg font-bold shadow-lg">404 ERROR</span>
        </div>
        <h1 class="text-4xl font-bold text-white mb-4">Explorer Lost?</h1>
        <p class="text-gray-500 mb-8 leading-relaxed">
            We searched the vast GitHub universe but couldn't find this specific profile. It might have been moved, renamed, or perhaps it never existed at all.
        </p>
        <div class="flex flex-col gap-4 items-center">
            <a href="index.html" class="inline-flex items-center gap-3 px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-full font-bold transition-all transform hover:scale-105 shadow-xl">
                <i class="fi fi-rr-arrow-left"></i> Return to Base
            </a>
            <p class="text-[10px] text-gray-600 uppercase tracking-widest mt-4">Profile Search Failed</p>
        </div>
    </div>
</body>
</html>
