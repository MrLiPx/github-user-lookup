<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Not Found · GitHub User Search</title>
  <meta name="description" content="This page doesn't exist.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://mrlipx.github.io/github-user-search/">
  <link rel="icon" type="image/png" href="https://mrlipx.github.io/github-user-search/assets/logo.png">
  <meta name="theme-color" content="#4b9cf5">
  <meta name="color-scheme" content="dark">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/4.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css">
  <link rel="stylesheet" href="assets/vars.css?v=IYwNhpt6h0">
  <link rel="stylesheet" href="assets/base.css?v=IYwNhpt6h0">
  <style>
    .nf {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 40px 24px;
      animation: fadeUp .4s ease both;
    }
    .nf-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 18vw, 11rem);
      font-weight: 800; line-height: 1;
      letter-spacing: -.06em;
      color: transparent;
      -webkit-text-stroke: 1.5px rgba(75,156,245,.2);
      margin-bottom: 10px; user-select: none;
    }
    .nf-code .z {
      -webkit-text-stroke: 1.5px rgba(75,156,245,.65);
      filter: drop-shadow(0 0 16px rgba(75,156,245,.22));
    }
    .nf-icon  { font-size: 1.7rem; color: var(--accent); margin-bottom: 16px; display: block; }
    .nf-title {
      font-family: var(--font-display);
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      font-weight: 800; letter-spacing: -.04em;
      color: var(--text); margin-bottom: 10px;
    }
    .nf-sub {
      font-size: .875rem; color: var(--sub);
      max-width: 340px; line-height: 1.75;
      margin: 0 auto 26px;
    }
    .nf-sub code {
      font-family: var(--font-mono); font-size: .8em;
      color: var(--accent); background: rgba(75,156,245,.08);
      padding: 1px 5px; border-radius: 4px; border: 1px solid rgba(75,156,245,.15);
    }
    .nf-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; background: var(--accent); color: #fff;
      border-radius: var(--r-sm); font-size: .875rem; font-weight: 600;
      text-decoration: none; transition: background .15s, transform .12s;
      margin-bottom: 28px; font-family: var(--font-sans);
    }
    .nf-btn:hover { background: #3d8ee6; transform: translateY(-1px); }
    .nf-path {
      font-family: var(--font-mono); font-size: .65rem; color: var(--muted);
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: var(--r-sm); padding: 6px 13px;
      max-width: 340px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .bg-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .bg-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(75,156,245,.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(75,156,245,.028) 1px, transparent 1px);
      background-size: 38px 38px;
      -webkit-mask-image: radial-gradient(ellipse 85% 55% at 50% 50%, #000 15%, transparent 100%);
              mask-image: radial-gradient(ellipse 85% 55% at 50% 50%, #000 15%, transparent 100%);
    }
    .bg-orb { position: absolute; border-radius: 50%; }
    .bg-orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(75,156,245,.065) 0%, transparent 70%); top: -200px; right: -100px; }
    .bg-orb-2 { width: 520px; height: 520px; background: radial-gradient(circle, rgba(192,132,252,.045) 0%, transparent 70%); bottom: -160px; left: -70px; }
  </style>
</head>
<body>
  <div class="bg-layer" aria-hidden="true">
    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
  </div>

  <main class="nf" role="main">
    <div class="nf-code" aria-hidden="true">4<span class="z">0</span>4</div>
    <i class="fi fi-rr-search nf-icon" aria-hidden="true"></i>
    <h1 class="nf-title">Page not found</h1>
    <p class="nf-sub">The path <code id="np"></code> doesn't exist or has moved.</p>
    <a class="nf-btn" href="https://mrlipx.github.io/github-user-search/">
      <i class="fi fi-rr-home" aria-hidden="true"></i>Back home
    </a>
    <div class="nf-path" id="nu"></div>
  </main>

  <script>
    (function() {
      var p = document.getElementById('np');
      var u = document.getElementById('nu');
      if (p) p.textContent = location.pathname;
      if (u) u.textContent = location.href;
    }());
  </script>
</body>
</html>
